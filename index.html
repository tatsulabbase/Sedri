<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="仕入れトレーナー" />
  <title>仕入れ判断トレーナー</title>
  <script src="<https://unpkg.com/react@18/umd/react.production.min.js>"></script>
  <script src="<https://unpkg.com/react-dom@18/umd/react-dom.production.min.js>"></script>
  <script src="<https://unpkg.com/@babel/standalone/babel.min.js>"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafaf9; font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN',system-ui,sans-serif; }
    input, select, textarea, button { font-family: inherit; -webkit-appearance: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;
    const PLATFORM_FEES = {"メルカリ":0.10,"Amazon(FBA)":0.15,"Amazon(自己発送)":0.10,"ヤフオク":0.10,"その他":0.10};
    const STATUS = {watching:{label:"判断中",color:"#6b7280",bg:"#f3f4f6"},bought:{label:"仕入れた",color:"#1d4ed8",bg:"#dbeafe"},skipped:{label:"見送り",color:"#92400e",bg:"#fef3c7"},sold:{label:"売れた",color:"#15803d",bg:"#dcfce7"},loss:{label:"失敗",color:"#b91c1c",bg:"#fee2e2"}};
    const emptyForm = () => ({name:"",jan:"",platform:"メルカリ",buyPrice:"",expectedSellPrice:"",shipCost:"",status:"watching",myCall:"buy",actualSellPrice:"",memo:""});
    function calcProfit({buyPrice,expectedSellPrice,shipCost,platform}){const buy=parseFloat(buyPrice)||0,sell=parseFloat(expectedSellPrice)||0,ship=parseFloat(shipCost)||0,feeRate=PLATFORM_FEES[platform]??0.1,fee=sell*feeRate,profit=sell-buy-ship-fee,margin=sell>0?(profit/sell)*100:0,roi=buy>0?(profit/buy)*100:0;return{profit,margin,roi,fee};}
    const yen=(n)=>(n<0?"-":"")+"¥"+Math.abs(Math.round(n)).toLocaleString("ja-JP");
    function Stat({label,value,hint,accent}){return(<div style={S.statBox}><div style={S.statLabel}>{label}</div><div style={{...S.statValue,color:accent||"#111827"}}>{value}</div>{hint&&<div style={S.statHint}>{hint}</div>}</div>);}
    function Field({label,children,wide}){return(<div style={{gridColumn:wide?"span 2":"span 1"}}><label style={S.label}>{label}</label>{children}</div>);}
    function Chip({children,active,onClick,color}){return(<button onClick={onClick} style={{...S.chip,background:active?(color||"#111827"):"#fff",color:active?"#fff":"#374151",borderColor:active?(color||"#111827"):"#e5e7eb"}}>{children}</button>);}
    function App(){
      const[items,setItems]=useState(()=>{try{const s=localStorage.getItem("sedori_items");return s?JSON.parse(s):[]}catch{return[]}});
      const[form,setForm]=useState(emptyForm());
      const[editingId,setEditingId]=useState(null);
      const[filter,setFilter]=useState("all");
      const fileRef=useRef(null);
      useEffect(()=>{try{localStorage.setItem("sedori_items",JSON.stringify(items))}catch{}},[items]);
      const live=useMemo(()=>calcProfit(form),[form]);
      const set=(k)=>(e)=>setForm(f=>({...f,[k]:e.target.value}));
      const submit=()=>{if(!form.name.trim())return;if(editingId){setItems(arr=>arr.map(it=><it.id>===editingId?{...it,...form}:it));setEditingId(null);}else{setItems(arr=>[{...form,id:Date.now(),createdAt:new Date().toISOString()},...arr]);}setForm(emptyForm());};
      const editItem=(it)=>{setForm({...it});setEditingId(<it.id>);window.scrollTo({top:0,behavior:"smooth"});};
      const delItem=(id)=>{setItems(arr=>arr.filter(it=><it.id>!==id));if(editingId===id){setEditingId(null);setForm(emptyForm());}};
      const filtered=useMemo(()=>filter==="all"?items:items.filter(it=>it.status===filter),[items,filter]);
      const stats=useMemo(()=>{const decided=items.filter(it=>it.status==="sold"||it.status==="loss"),hit=decided.filter(it=>it.myCall==="buy"?it.status==="sold":it.status==="loss").length,accuracy=decided.length?(hit/decided.length)*100:0,sold=items.filter(it=>it.status==="sold"),realized=sold.reduce((sum,it)=>{const s=parseFloat(it.actualSellPrice)||parseFloat(it.expectedSellPrice)||0;return sum+calcProfit({...it,expectedSellPrice:s}).profit;},0),bought=items.filter(it=>["bought","sold","loss"].includes(it.status)),invested=bought.reduce((s,it)=>s+(parseFloat(it.buyPrice)||0),0);return{total:items.length,decided:decided.length,accuracy,realized,invested};},[items]);
      const exportCsv=()=>{const headers=["id","createdAt","name","jan","platform","buyPrice","expectedSellPrice","shipCost","status","myCall","actualSellPrice","memo"],rows=items.map(it=>headers.map(h=>`"${String(it[h]??"").replace(/"/g,'""')}"`).join(",")),csv="﻿"+[headers.join(","),...rows].join("\n"),blob=new Blob([csv],{type:"text/csv;charset=utf-8;"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`sedori_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);};
      const importCsv=(e)=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{const text=String(ev.target.result).replace(/^﻿/,""),lines=text.split(/\r?\n/).filter(l=>l.trim()),headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"")),parsed=lines.slice(1).map(line=>{const cells=line.match(/("([^"]|"")*"|[^,]*)/g)?.filter((_,i,a)=>i<a.length)||[],obj={};headers.forEach((h,i)=>{obj[h]=(cells[i]||"").replace(/^"|"$/g,"").replace(/""/g,'"');});<obj.id>=<obj.id>?Number(<obj.id>):Date.now()+Math.random();return obj;});setItems(parsed);};reader.readAsText(file);e.target.value="";};
      return(
        <div style={S.page}>
          <header style={S.header}>
            <div><h1 style={S.h1}>仕入れ判断トレーナー</h1><p style={S.sub}>電脳せどりで目を鍛える · 記録して答え合わせ</p></div>
            <div style={S.headerBtns}><button style={S.ghostBtn} onClick={()=>fileRef.current?.click()}>CSV読込</button><button style={S.ghostBtn} onClick={exportCsv}>CSV保存</button><input ref={fileRef} type="file" accept=".csv" onChange={importCsv} style={{display:"none"}}/></div>
          </header>
          <div style={S.statsRow}><Stat label="記録数" value={stats.total}/><Stat label="判断精度" value={stats.decided?`${stats.accuracy.toFixed(0)}%`:"—"} hint={`${stats.decided}件で検証`}/><Stat label="確定利益" value={yen(stats.realized)} accent={stats.realized>=0?"#15803d":"#b91c1c"}/><Stat label="投下資金" value={yen(stats.invested)}/></div>
          <div style={S.card}>
            <div style={S.cardTitle}>{editingId?"編集中":"新しい商品を記録"}</div>
            <div style={S.formGrid}>
              <Field label="商品名" wide><input style={S.input} value={form.name} onChange={set("name")} placeholder="例: 〇〇ワイヤレスイヤホン"/></Field>
              <Field label="JANコード"><input style={S.input} value={form.jan} onChange={set("jan")} placeholder="4901234567890" inputMode="numeric"/></Field>
              <Field label="販売先"><select style={S.input} value={form.platform} onChange={set("platform")}>{Object.keys(PLATFORM_FEES).map(p=><option key={p}>{p}</option>)}</select></Field>
              <Field label="仕入れ価格"><input style={S.input} type="number" inputMode="numeric" value={form.buyPrice} onChange={set("buyPrice")} placeholder="円"/></Field>
              <Field label="想定売価"><input style={S.input} type="number" inputMode="numeric" value={form.expectedSellPrice} onChange={set("expectedSellPrice")} placeholder="円"/></Field>
              <Field label="送料・梱包"><input style={S.input} type="number" inputMode="numeric" value={form.shipCost} onChange={set("shipCost")} placeholder="円"/></Field>
              <Field label="自分の判断"><select style={S.input} value={form.myCall} onChange={set("myCall")}><option value="buy">仕入れる</option><option value="pass">見送る</option></select></Field>
              <Field label="ステータス"><select style={S.input} value={form.status} onChange={set("status")}>{Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></Field>
              <Field label="実際の売価（答え合わせ）"><input style={S.input} type="number" inputMode="numeric" value={form.actualSellPrice} onChange={set("actualSellPrice")} placeholder="売れた金額"/></Field>
              <Field label="メモ" wide><input style={S.input} value={form.memo} onChange={set("memo")} placeholder="判断理由・気づきなど"/></Field>
            </div>
            <div style={S.calcBar}>
              <div style={S.calcItem}><span style={S.calcLabel}>想定利益</span><span style={{...S.calcVal,color:live.profit>=0?"#15803d":"#b91c1c"}}>{yen(live.profit)}</span></div>
              <div style={S.calcItem}><span style={S.calcLabel}>利益率</span><span style={S.calcVal}>{live.margin.toFixed(1)}%</span></div>
              <div style={S.calcItem}><span style={S.calcLabel}>ROI</span><span style={S.calcVal}>{live.roi.toFixed(1)}%</span></div>
              <div style={S.calcItem}><span style={S.calcLabel}>手数料</span><span style={S.calcValMuted}>{yen(live.fee)}</span></div>
              <button style={S.primaryBtn} onClick={submit}>{editingId?"更新する":"記録する"}</button>
              {editingId&&<button style={S.ghostBtn} onClick={()=>{setEditingId(null);setForm(emptyForm());}}>キャンセル</button>}
            </div>
          </div>
          <div style={S.filterRow}><Chip active={filter==="all"} onClick={()=>setFilter("all")}>すべて</Chip>{Object.entries(STATUS).map(([k,v])=><Chip key={k} active={filter===k} onClick={()=>setFilter(k)} color={v.color}>{v.label}</Chip>)}</div>
          <div style={S.list}>
            {filtered.length===0&&<div style={S.empty}>まだ記録がないで。電脳で見つけた商品を上から記録していこか。<br/><span style={{fontSize:13,color:"#9ca3af"}}>判断精度は「仕入れた→売れた」「見送り→失敗」が一致した割合で計算されるで。</span></div>}
            {filtered.map(it=>{const sellForCalc=parseFloat(it.actualSellPrice)||parseFloat(it.expectedSellPrice)||0,r=calcProfit({...it,expectedSellPrice:sellForCalc}),st=STATUS[it.status]||STATUS.watching;return(<div key={<it.id>} style={S.row}><div style={{flex:1,minWidth:0}}><div style={S.rowTop}><span style={S.rowName}>{it.name}</span><span style={{...S.badge,color:st.color,background:st.bg}}>{st.label}</span><span style={S.callTag}>{it.myCall==="buy"?"🟢仕入":"⚪見送"}</span></div><div style={S.rowMeta}>{it.platform} · 仕入 {yen(parseFloat(it.buyPrice)||0)} → 売 {yen(sellForCalc)}{it.jan&&<span style={S.jan}> · JAN {it.jan}</span>}</div>{it.memo&&<div style={S.memo}>{it.memo}</div>}</div><div style={S.rowRight}><div style={{...S.rowProfit,color:r.profit>=0?"#15803d":"#b91c1c"}}>{yen(r.profit)}</div><div style={S.rowRoi}>ROI {r.roi.toFixed(0)}%</div><div style={S.rowActions}><button style={S.miniBtn} onClick={()=>editItem(it)}>編集</button><button style={S.miniBtnDel} onClick={()=>delItem(<it.id>)}>削除</button></div></div></div>);})}
          </div>
          <footer style={S.footer}>データはこのブラウザ内だけに保持されるで。閉じる前に必ず「CSV保存」してな。次回は「CSV読込」で復元できる。</footer>
        </div>
      );
    }
    const S={page:{maxWidth:920,margin:"0 auto",padding:"20px 14px 80px",color:"#111827",background:"#fafaf9",minHeight:"100vh"},header:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:10,marginBottom:16},h1:{fontSize:22,fontWeight:800,letterSpacing:"-0.02em"},sub:{fontSize:12,color:"#6b7280",marginTop:3},headerBtns:{display:"flex",gap:8},statsRow:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14},statBox:{background:"#fff",border:"1px solid #ececec",borderRadius:12,padding:"10px 12px"},statLabel:{fontSize:10,color:"#9ca3af",fontWeight:600},statValue:{fontSize:18,fontWeight:800,marginTop:2},statHint:{fontSize:10,color:"#9ca3af",marginTop:2},card:{background:"#fff",border:"1px solid #ececec",borderRadius:14,padding:14,marginBottom:14},cardTitle:{fontSize:13,fontWeight:700,marginBottom:12,color:"#374151"},formGrid:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10},label:{display:"block",fontSize:11,color:"#6b7280",fontWeight:600,marginBottom:4},input:{width:"100%",padding:"10px 11px",border:"1px solid #e5e7eb",borderRadius:9,fontSize:15,outline:"none",background:"#fcfcfc",color:"#111827"},calcBar:{display:"flex",alignItems:"center",gap:14,marginTop:14,padding:"12px 12px",background:"#f9fafb",borderRadius:10,flexWrap:"wrap"},calcItem:{display:"flex",flexDirection:"column"},calcLabel:{fontSize:10,color:"#9ca3af",fontWeight:600},calcVal:{fontSize:16,fontWeight:800},calcValMuted:{fontSize:14,fontWeight:600,color:"#6b7280"},primaryBtn:{marginLeft:"auto",padding:"12px 20px",background:"#111827",color:"#fff",border:"none",borderRadius:9,fontSize:15,fontWeight:700,cursor:"pointer"},ghostBtn:{padding:"9px 13px",background:"#fff",color:"#374151",border:"1px solid #e5e7eb",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer"},filterRow:{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"},chip:{padding:"7px 13px",borderRadius:999,border:"1px solid",fontSize:13,fontWeight:600,cursor:"pointer"},list:{display:"flex",flexDirection:"column",gap:8},empty:{textAlign:"center",padding:"36px 16px",color:"#6b7280",background:"#fff",border:"1px dashed #e5e7eb",borderRadius:14,lineHeight:1.8,fontSize:14},row:{display:"flex",gap:12,background:"#fff",border:"1px solid #ececec",borderRadius:13,padding:"13px 14px",animation:"fadeIn .2s ease"},rowTop:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"},rowName:{fontSize:14,fontWeight:700},badge:{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:999},callTag:{fontSize:11,color:"#6b7280"},rowMeta:{fontSize:12,color:"#6b7280",marginTop:4},jan:{color:"#9ca3af"},memo:{fontSize:12,color:"#4b5563",marginTop:5,padding:"5px 9px",background:"#f9fafb",borderRadius:7},rowRight:{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,minWidth:90},rowProfit:{fontSize:16,fontWeight:800},rowRoi:{fontSize:11,color:"#9ca3af"},rowActions:{display:"flex",gap:5,marginTop:5},miniBtn:{padding:"5px 10px",background:"#f3f4f6",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",color:"#374151"},miniBtnDel:{padding:"5px 10px",background:"#fef2f2",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",color:"#b91c1c"},footer:{marginTop:24,fontSize:12,color:"#9ca3af",textAlign:"center",lineHeight:1.7}};
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
